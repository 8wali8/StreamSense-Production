# config-server/config-repo/video-service.yml

server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka # url through docker

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
      endpoint:
        prometheus:
          enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans