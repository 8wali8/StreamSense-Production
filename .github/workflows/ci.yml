name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service:
          - eureka-server
          - config-server
          - api-gateway
          - chat-service
          - sentiment-service
          - video-service
          - recommendation-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build & test
        working-directory: ${{ matrix.service }}
        run: mvn -B -ntp clean test